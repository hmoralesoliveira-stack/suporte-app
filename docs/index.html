<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal de Suporte</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      padding: 40px;
    }

    h1 {
      color: #58a6ff;
    }

    .box {
      background-color: #161b22;
      padding: 24px;
      border-radius: 8px;
      max-width: 500px;
    }

    a {
      display: block;
      margin: 12px 0;
      color: #58a6ff;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    .info {
      font-size: 14px;
      color: #8b949e;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Portal de Suporte</h1>

  <div class="box">
    <p>Bem-vindo ao sistema de suporte.</p>

    <a href="https://github.com/hmoralesoliveira-stack/suporte-app/issues/new?template=suporte.yml">
      ➕ Abrir chamado de suporte
    </a>

    <a href="https://github.com/hmoralesoliveira-stack/suporte-app/issues">
      📋 Ver meus chamados
    </a>

    <div class="info">
      * É necessário estar logado no GitHub para abrir um chamado.
    </div>
  </div>

</body>
</html>
